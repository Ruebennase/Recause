<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A House Inventory Chatbot based on the ChatWizard Framework and the Recause Framework</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: "Helvetica", sans-serif;
      font-size: 18px;
      color: #eee;
    }
    #chat-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      background: #111;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .question-block {
      margin: 12px 0;
      padding: 8px;
      background: #222;
      border-radius: 4px;
      position: relative;
    }
    .question-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .edit-button {
      margin-left: auto;
      cursor: pointer;
      background: #444;
      border: 1px solid #888;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
    }
    .edit-button:hover {
      background: #666;
    }
    .question-text {
      color: #ff9900; /* orange */
      font-weight: bold;
      margin-bottom: 6px;
    }
    .answer-line {
      margin: 4px 0;
      color: #eee;
    }
    input, textarea, select {
      background: #333;
      border: 1px solid #666;
      color: #eee;
      padding: 4px;
      font-family: inherit;
      font-size: 16px;
      border-radius: 4px;
      display: block;
      margin-bottom: 8px;
      width: 100%;
      box-sizing: border-box;
    }
    input:focus, textarea:focus, select:focus {
      outline: 1px solid #888;
    }
    button {
      cursor: pointer;
      background: #444;
      border: 1px solid #888;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      margin: 2px;
    }
    button:hover {
      background: #666;
    }
    .option-line {
      margin: 4px 0;
    }
    .option-line label {
      margin-left: 4px;
      cursor: pointer;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .option-line {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }
    .option-line input[type="radio"],
    .option-line input[type="checkbox"] {
      vertical-align: middle; /* to line up input & text nicely */
      margin-right: 6px;      /* spacing between input and text */
    }
    input[type="radio"],
    input[type="checkbox"] {
      display: inline-block !important;
      width: auto !important;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div id="chat-container"></div>

<script>
/*******************************************************************************
 * (1) Recause Framework
 *     - Supports frameworks and applications based on the recause programming
 *       model. Can be considered a metaframework as unlikely used on its own.
 *     - The programming model iterates over the same single flow (a programming
 *       language function) until the purpose of the flow is fulfilled.
 *       The purpose is fulfilled once a certain flow state associated with the
 *       engine instance running the flow has been reached. Then the iterations
 *       and the engine instance stop and the remaining state can be used.
 *       The flow can be arbitrarily complex and stop its own execution at any
 *       point, typically whenever necessary state is missing. Once new state
 *       is considered to have become available the next iteration starts.
 *       The programming model allows for very concisely defined domain-specific
 *       flows. And it is suitable to build derived frameworks for specific
 *       types of domain applications, making the domain-specific flows even 
 *       more concise.
 *     - The programming model - by making all relevant engine instance state
 *       explicit - allows for flows to move freely between engines running
 *       the same flow. So an executing flow is portable by suspending the
 *       flow execution and serialising the state in the original engine
 *       and loading the state and resuming the flow execution in the new
 *       engine.
 *     - The Recause Framework is new and unrefined. It has a number of 
 *       supporting functions that may be useful but may turn out to be 
 *       superfluous. Likely other supporting functions would be desirable
 *       and we only find out over time. Feedback is welcome, enjoy!
 *     - UPDATE: Latest change is from flat state to hierarchical state
 *       with dot notation.
 ******************************************************************************/

class StopFlow extends Error {
  constructor() {
    super("StopFlow");
    this.name = "StopFlow";
  }
}

class RestartFlow extends Error {
  constructor() {
    super("RestartFlow");
    this.name = "RestartFlow";
  }
}

/**********************************************************
 * RecauseEngine, now with Hierarchical State (dot-notation)
 **********************************************************/
class RecauseEngine {
  constructor(savedState) {
    if (!savedState) {
      this._initEmpty();
    } else if (typeof savedState === "string") {
      const parsed = JSON.parse(savedState);
      this.stateTree = parsed.stateTree;
      this.globalRev = parsed.globalRev;
    } else {
      this.stateTree = savedState.stateTree;
      this.globalRev = savedState.globalRev;
    }
  }

  _initEmpty() {
    this.stateTree = ["root", [], 0];
    this.globalRev = 0;
  }

  saveStateToJSON() {
    return JSON.stringify({
      stateTree: this.stateTree,
      globalRev: this.globalRev,
    });
  }

  loadStateFromJSON(jsonString) {
    const parsed = JSON.parse(jsonString);
    this.stateTree = parsed.stateTree;
    this.globalRev = parsed.globalRev;
  }

  runFlow(flowFn) {
    while (true) {
      try {
        flowFn({ recause: this });
        break;
      } catch (e) {
        if (e instanceof StopFlow) {
          break;
        } else if (e instanceof RestartFlow) {
          continue;
        } else {
          throw e;
        }
      }
    }
  }

  stopHere() {
    throw new StopFlow();
  }

  reRunNow() {
    throw new RestartFlow();
  }

  setState(pathString, newValue) {
    const pathArray = this._dotPathToArray(pathString);
    this._setValueAtPathArray(pathArray, newValue);
  }

  getState(pathString) {
    const pathArray = this._dotPathToArray(pathString);
    return this._getValueAtPathArray(pathArray);
  }

  revisionState(pathString) {
    const pathArray = this._dotPathToArray(pathString);
    return this._getRevisionAtPathArray(pathArray);
  }

  removeState(pathString) {
    const pathArray = this._dotPathToArray(pathString);
    this._removeNodeAtPathArray(pathArray);
  }

  ageState(pathString) {
    const nodeRev = this.revisionState(pathString);
    if (typeof nodeRev !== "number") {
      return Infinity;
    }
    return (this.globalRev - nodeRev) + 1;
  }

  hasState(pathString) {
    const value = this.getState(pathString);
    return value == undefined ? false : true;
  }

  getStateElseStop(pathString) {
    const value = this.getState(pathString);
    if (value == undefined) {
      this.stopHere();
    }
    return value;
  }

  getStateOrDefault(pathString, defaultVal) {
    const value = this.getState(pathString);
    return value == undefined ? defaultVal : value;
  }

  forceStateOrder(olderPathStr, newerPathStr) {
    const age1 = this.ageState(olderPathStr);
    const age2 = this.ageState(newerPathStr);
    if (!(age1 > age2)) {
      this.removeState(newerPathStr);
    }
  }

  _dotPathToArray(dotPath) {
    return !dotPath ? [] : dotPath.split(".");
  }

  _getNodeByPath(pathArray, createIfMissing = false) {
    const chain = [this.stateTree];
    let currentNode = this.stateTree;

    for (const key of pathArray) {
      let children = Array.isArray(currentNode[1]) ? currentNode[1] : null;
      if (!children) {
        if (!createIfMissing) {
          return [null, chain];
        }
        currentNode[1] = [];
        children = currentNode[1];
      }
      let child = children.find((c) => c[0] === key);
      if (!child && createIfMissing) {
        child = [key, [], 0];
        children.push(child);
      } else if (!child) {
        return [null, chain];
      }
      chain.push(child);
      currentNode = child;
    }

    return [currentNode, chain];
  }

  _setValueAtPathArray(pathArray, newValue) {
    this.globalRev++;
    const newRev = this.globalRev;

    const [targetNode, chain] = this._getNodeByPath(pathArray, true);
    if (!targetNode) return;

    targetNode[1] = newValue;
    targetNode[2] = newRev;

    for (const ancestor of chain.slice(0, -1)) {
      ancestor[2] = newRev;
    }
  }

  _getValueAtPathArray(pathArray) {
    const [node] = this._getNodeByPath(pathArray, false);
    return node ? node[1] : undefined;
  }

  _getRevisionAtPathArray(pathArray) {
    const [node] = this._getNodeByPath(pathArray, false);
    return node ? node[2] : undefined;
  }

  _removeNodeAtPathArray(pathArray) {
    if (pathArray.length === 0) {
      return;
    }
    const parentPath = pathArray.slice(0, -1);
    const keyToRemove = pathArray[pathArray.length - 1];

    const [parentNode, chain] = this._getNodeByPath(parentPath, false);
    if (!parentNode) return;

    const children = Array.isArray(parentNode[1]) ? parentNode[1] : null;
    if (!children) return;

    const idx = children.findIndex((c) => c[0] === keyToRemove);
    if (idx === -1) {
      return;
    }
    children.splice(idx, 1);

    this.globalRev++;
    const newRev = this.globalRev;
    for (const ancestor of chain) {
      ancestor[2] = newRev;
    }
  }
}

/*******************************************************************************
 * (2) ChatWizard Framework
 *     - Uses the Recause Framework for flow and state management
 *     - Provides askText, askMulti, askRadio, askCheckbox, askButton, 
 *       askButtonForced dialog widgets for super concise domain chat flows.
 *     - Skips a prompt if an answer exists and not in edit mode or forced
 *     - Passes access to the Recause Framework on to the domain application
 *       so it can enforce its own rules for flow and state managemen.
 *     - UPDATE: Indentations possible for better visualisation of e.g. 
 *       hierarchical state.
 ******************************************************************************/

class ChatWizard {
  constructor(container, savedState, domainFlow) {
    this.container = container;
    this.recauseEngine = new RecauseEngine(savedState);
    this.domainFlow = domainFlow;
    this.editing = {};
    this.frameworkApi = this.buildFrameworkAPI();
  }

  runFlow() {
    this.recauseEngine.runFlow(({ recause }) => this.internalFlow(recause));
  }

  internalFlow(recause) {
    this.container.innerHTML = "";
    this.indentLevel = 0;
    const flow = { ...this.frameworkApi, recause };
    this.domainFlow(flow);
  }

  buildFrameworkAPI() {
    const self = this;

    return {
      say(message) {
        const block = document.createElement('div');
        block.className = 'question-block';
        block.style.marginLeft = (self.indentLevel * 2) + "em"; // apply indentation

        const txt = document.createElement('div');
        txt.className = 'question-text';
        txt.textContent = message;
        block.appendChild(txt);

        self.container.appendChild(block);
      },

      askText(question, key) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderTextInput(question, key, val || "");
        self.recauseEngine.stopHere();
      },

      askMultiText(question, key) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderMultiTextInput(question, key, val || "");
        self.recauseEngine.stopHere();
      },

      askRadio(question, key, options) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderRadioInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      askCheckbox(question, key, options) {
        const val = self.recauseEngine.getState(key) || "";
        const editing = !!self.editing[key];
        if (val && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderCheckboxInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      askButton(question, key, options) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderButtonInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      askButtonForced(question, key, options) {
        const val = self.recauseEngine.getState(key);
        self.renderButtonInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      pushIndent() {
        self.indentLevel++;
      },

      popIndent() {
        if (self.indentLevel > 0) {
          self.indentLevel--;
        }
      },

      setIndent(n) {
        self.indentLevel = Math.max(0, n);
      }
    };
  }

  // The next methods just need a line to apply indentation in each render block:

  renderReadOnly(question, answerVal, key) {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.style.marginLeft = (this.indentLevel * 2) + "em";

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-button';
    editBtn.textContent = "Edit";
    editBtn.onclick = () => {
      Object.keys(this.editing).forEach(k => this.editing[k] = false);
      this.editing[key] = true;
      this.runFlow();
    };
    header.appendChild(editBtn);

    block.appendChild(header);

    const ans = document.createElement('div');
    ans.className = 'answer-line';
    ans.textContent = answerVal;
    block.appendChild(ans);

    this.container.appendChild(block);
  }

  renderTextInput(question, key, existingVal) {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.style.marginLeft = (this.indentLevel * 2) + "em";

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = existingVal;
    block.appendChild(inp);

    const finalize = () => {
      const val = inp.value.trim() || undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };

    inp.addEventListener('keydown', ev => {
      if (ev.key==="Enter") {
        ev.preventDefault();
        finalize();
      }
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = finalize;
    block.appendChild(btn);

    this.container.appendChild(block);
    inp.focus();
  }

  renderMultiTextInput(question, key, existingVal) {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.style.marginLeft = (this.indentLevel * 2) + "em";

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const ta = document.createElement('textarea');
    ta.rows = 4;
    ta.value = existingVal;
    block.appendChild(ta);

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const val = ta.value.trim() || undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    ta.focus();
  }

  renderRadioInput(question, key, existingVal, options) {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.style.marginLeft = (this.indentLevel * 2) + "em";

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    let firstRadio = null;
    options.forEach(opt => {
      const labelEl = document.createElement('label');
      labelEl.className = 'option-line';

      const r = document.createElement('input');
      r.type = 'radio';
      r.name = key;
      r.value = opt.value;
      if (opt.value === existingVal) r.checked = true;
      if (!firstRadio) firstRadio = r;

      labelEl.appendChild(r);
      labelEl.appendChild(document.createTextNode(" " + (opt.label || opt.value)));
      block.appendChild(labelEl);
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const chosen = block.querySelector(`input[name="${key}"]:checked`);
      const val = chosen ? chosen.value : undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    if (firstRadio) firstRadio.focus();
  }

  renderCheckboxInput(question, key, existingVal, options) {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.style.marginLeft = (this.indentLevel * 2) + "em";

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const chosenValues = existingVal
      ? existingVal.split(",").map(x => x.trim()).filter(Boolean)
      : [];
    let firstCheck = null;

    options.forEach(opt => {
      const labelEl = document.createElement('label');
      labelEl.className = 'option-line';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = opt.value;
      if (chosenValues.includes(opt.value)) cb.checked = true;
      if (!firstCheck) firstCheck = cb;

      labelEl.appendChild(cb);
      labelEl.appendChild(document.createTextNode(" " + (opt.label || opt.value)));
      block.appendChild(labelEl);
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const cbs = block.querySelectorAll('input[type="checkbox"]');
      const arr = [];
      cbs.forEach(c => {
        if (c.checked) arr.push(c.value);
      });
      const val = arr.length>0 ? arr.join(", ") : undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    if (firstCheck) firstCheck.focus();
  }

  renderButtonInput(question, key, existingVal, options) {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.style.marginLeft = (this.indentLevel * 2) + "em";

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const btnRow = document.createElement('div');
    btnRow.className = 'button-row';

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.textContent = opt.label || opt.value;
      btn.onclick = () => {
        this.recauseEngine.setState(key, opt.value);
        this.editing[key] = false;
        this.runFlow();
      };
      btnRow.appendChild(btn);
    });

    block.appendChild(btnRow);
    this.container.appendChild(block);

    const firstBtn = btnRow.querySelector('button');
    if (firstBtn) firstBtn.focus();
  }

  saveStateToJSON() {
    return this.recauseEngine.saveStateToJSON();
  }
}

/*******************************************************************************
 * (3) Business domain specific House Inventory Chat flow
 *     - Demonstrates usage of the ChatWizard and Recause Frameworks
 *     - Very concise flow programming keeping full JavaScript programming
 *       flexibility as not reliant on a typical DSL-based programming model.
 *     - Still potential to make things even more concise. But hard to beat.
 *     - Note how the missing passport causes a change in the flow. Try it!
 *     - Another Framework might offer a multi-page forms wizard instead in 
 *       a similarly concise fashion.
 ******************************************************************************/

function domainFlow(flow) {
  flow.say("Hello! We'll ask about your houses now (four questions each).");
  flow.askText("What is your name?", "name");
  flow.askText("How many houses do you have, "+flow.recause.getStateOrDefault("name","")+"?", "houseCount");
  const count = parseInt(flow.recause.getState("houseCount") || "0", 10);
  if (count > 0) {
    for (let i = 0; i < count; i++) {
      flow.say(`Let's look at house #${i + 1}:`);
      flow.pushIndent();
      flow.askText(`Street of house #${i + 1}?`, `house${i}.street`);
      flow.askRadio(
        `Which region is house #${i + 1} located in?`,
        `house${i}.region`,
        [
          { value: "north", label: "North" },
          { value: "south", label: "South" },
          { value: "east",  label: "East"  },
          { value: "west",  label: "West"  }
        ]
      );
      flow.askText(`ZIP code of house #${i + 1}?`, `house${i}.zip`);
      flow.askCheckbox(
        `Which amenities does house #${i + 1} have?`,
        `house${i}.amenities`,
        [
          { value: "Heater", label: "Heater" },
          { value: "AC",     label: "Air Conditioning" },
          { value: "Pool",   label: "Pool" }
        ]
      );
      flow.popIndent();
    }
  } else {
    flow.say("No houses => skipping addresses!");
  }
  flow.askMultiText("Any final remarks or comments?", "finalRemarks");
  if (flow.recause.getState("okShowMe") === "yes") {
    window.showData();
    flow.recause.removeState("okShowMe");
  }
  flow.askButtonForced(
    `We're done, shall I show you the state captured so far?`,
    `okShowMe`,
    [
      { value: "yes", label: "Yes, please" },
      { value: "no",  label: "No, thanks" }
    ]
  );

}

/*******************************************************************************
 * (4) Integration
 ******************************************************************************/

document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById('chat-container');
  const savedState = localStorage.getItem("chatFlowState") || null;

  const wizard = new ChatWizard(container, savedState, domainFlow);
  wizard.runFlow();

  window.showData = () => {
    const json = wizard.saveStateToJSON();
    console.log("Flow State (current):", JSON.parse(json));
    alert("Open console => see final JSON:\n\n" + json);
  };
  window.saveData = () => {
    localStorage.setItem("chatFlowState", wizard.saveStateToJSON());
    alert("State saved to localStorage!");
  };
});
</script>
</body>
</html>
