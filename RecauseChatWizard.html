<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A Vacation Planning Chatbot based on the ChatWizard Framework and the Recause Framework</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: "Helvetica", sans-serif;
      font-size: 18px;
      color: #eee;
    }
    #chat-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      background: #111;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .question-block {
      margin: 12px 0;
      padding: 8px;
      background: #222;
      border-radius: 4px;
      position: relative;
    }
    .question-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .edit-button {
      margin-left: auto;
      cursor: pointer;
      background: #444;
      border: 1px solid #888;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
    }
    .edit-button:hover {
      background: #666;
    }
    .question-text {
      color: #ff9900; /* orange */
      font-weight: bold;
      margin-bottom: 6px;
    }
    .answer-line {
      margin: 4px 0;
      color: #eee;
    }
    input, textarea, select {
      background: #333;
      border: 1px solid #666;
      color: #eee;
      padding: 4px;
      font-family: inherit;
      font-size: 16px;
      border-radius: 4px;
      display: block;
      margin-bottom: 8px;
      width: 100%;
      box-sizing: border-box;
    }
    input:focus, textarea:focus, select:focus {
      outline: 1px solid #888;
    }
    button {
      cursor: pointer;
      background: #444;
      border: 1px solid #888;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      margin: 2px;
    }
    button:hover {
      background: #666;
    }
    .option-line {
      margin: 4px 0;
    }
    .option-line label {
      margin-left: 4px;
      cursor: pointer;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>

<div id="chat-container"></div>

<script>
/*******************************************************************************
 * (1) Recause Framework
 *     - Supports frameworks and applications based on the recause programming
 *       model. Can be considered a metaframework as unlikely used on its own.
 *     - The programming model iterates over the same single flow (a programming
 *       language function) until the purpose of the flow is fulfilled.
 *       The purpose is fulfilled once a certain flow state associated with the
 *       engine instance running the flow has been reached. Then the iterations
 *       and the engine instance stop and the remaining state can be used.
 *       The flow can be arbitrarily complex and stop its own execution at any
 *       point, typically whenever necessary state is missing. Once new state
 *       is considered to have become available the next iteration starts.
 *       The programming model allows for very concisely defined domain-specific
 *       flows. And it is suitable to build derived frameworks for specific
 *       types of domain applications, making the domain-specific flows even 
 *       more concise.
 *     - The programming model - by making all relevant engine instance state
 *       explicit - allows for flows to move freely between engines running
 *       the same flow. So an executing flow is portable by suspending the
 *       flow execution and serialising the state in the original engine
 *       and loading the state and resuming the flow execution in the new
 *       engine.
 *     - The Recause Framework is new and unrefined. It has a number of 
 *       supporting functions that may be useful but may turn out to be 
 *       superfluous. Likely other supporting functions would be desirable
 *       and we only find out over time. Feedback is welcome, enjoy!
 ******************************************************************************/
class StopFlow extends Error {
  constructor() {
    super("StopFlow");
    this.name = "StopFlow";
  }
}
class RestartFlow extends Error {
  constructor() {
    super("RestartFlow");
    this.name = "RestartFlow";
  }
}

class RecauseEngine {
  constructor(savedState) {
    let initialData = {};
    if (typeof savedState === 'string') {
      try {
        initialData = JSON.parse(savedState);
      } catch (e) {
        // ignoring parse errors for now
      }
    } else if (typeof savedState === 'object' && savedState !== null) {
      initialData = savedState;
    }
    this.state = { ...initialData };

    // Snapshots: 1-run-ago, 2-runs-ago. Not certain yet if these are useful.
    this.stateBefore = {};
    this.state2Before = {};

    this.changeCount = 0; // global revision counter of state items
    this.stateKeyChangeCount = {};

    // For the "before" snapshots
    this.stateKeyChangeCountBefore  = {};
    this.stateKeyChangeCount2Before = {};
  }

  runFlow(flowFn) {
    while (true) {
      // SHIFT older snapshots
      this.state2Before = JSON.parse(JSON.stringify(this.stateBefore));
      this.stateBefore  = JSON.parse(JSON.stringify(this.state));

      this.stateKeyChangeCount2Before = JSON.parse(JSON.stringify(this.stateKeyChangeCountBefore));
      this.stateKeyChangeCountBefore  = JSON.parse(JSON.stringify(this.stateKeyChangeCount));

      try {
        flowFn({ recause: this });
        break;
      } catch(e) {
        if (e instanceof StopFlow) {
          break; // normal pause => done
        } else if (e instanceof RestartFlow) {
          continue; // re-run from top
        } else {
          throw e;
        }
      }
    }
  }

  stopHere() {
    throw new StopFlow();
  }

  reRunNow() {
    throw new RestartFlow();
  }

  hasState(key) {
    return Object.prototype.hasOwnProperty.call(this.state, key);
  }
  getState(key) {
    return this.state[key];
  }

  setState(key, newVal) {
    const oldVal = this.state[key];
    if (oldVal === newVal) {
      return; // no increment if the value didn’t actually change
    }
    this.changeCount++; // keep track of how recent the state is
    this.stateKeyChangeCount[key] = this.changeCount;
    this.state[key] = newVal;
  }

  touchState(key) {
    this.changeCount++; // make state recent without actually changing it
    this.stateKeyChangeCount[key] = this.changeCount;
  }

  removeState(key) {
    delete this.state[key];
    // optional: delete this.stateKeyChangeCount[key];
    // for now we keep the state's metadata, not certain if useful
  }

  ageState(key) {
    const rev = this.stateKeyChangeCount[key];
    if (!rev) return Infinity; // if it was never set the age is Infinity
    return (this.changeCount - rev) + 1;
  }

  forceStateOrder(firstKey, subsequentKey) {
    const a1 = this.ageState(firstKey);
    const a2 = this.ageState(subsequentKey);
    if (!(a1 > a2)) {
      this.removeState(subsequentKey); // if an order relation is needed we enforce it
    }
  }

  // "before" snapshot helpers
  hasStateBefore(key) {
    return Object.prototype.hasOwnProperty.call(this.stateBefore, key);
  }
  getStateBefore(key) {
    return this.stateBefore[key];
  }
  ageStateBefore(key) {
    const rev = this.stateKeyChangeCountBefore[key];
    if (!rev) return Infinity;
    return (this.changeCount - rev) + 1;
  }

  hasState2Before(key) {
    return Object.prototype.hasOwnProperty.call(this.state2Before, key);
  }
  getState2Before(key) {
    return this.state2Before[key];
  }
  ageState2Before(key) {
    const rev = this.stateKeyChangeCount2Before[key];
    if (!rev) return Infinity;
    return (this.changeCount - rev) + 1;
  }

  // Serialization
  serializeState() {
    return JSON.stringify(this.state);
  }
}

/*******************************************************************************
 * (2) ChatWizard Framework
 *     - Uses the Recause Framework for flow and state management
 *     - Provides askText, askMulti, askRadio, askCheckbox, askButton, 
 *       askButtonForced dialog widgets for super concise domain chat flows.
 *     - Skips a prompt if an answer exists and not in edit mode or forced
 *     - Passes access to the Recause Framework on to the domain application
 *       so it can enforce its own rules for flow and state managemen.
 ******************************************************************************/
class ChatWizard {
  constructor(container, savedState, domainFlow) {
    this.container = container;
    this.recauseEngine = new RecauseEngine(savedState);
    this.domainFlow = domainFlow;
    this.editing = {};

    this.frameworkApi = this.buildFrameworkAPI();
  }

  runFlow() {
    this.container.innerHTML = "";
    this.recauseEngine.runFlow(({ recause }) => this.internalFlow(recause));
  }

  internalFlow(recause) {
    this.container.innerHTML = "";
    const flow = { ...this.frameworkApi, recause };
    this.domainFlow(flow);
  }

  buildFrameworkAPI() {
    const self = this;

    return {
      say(message) {
        const block = document.createElement('div');
        block.className = 'question-block';

        const txt = document.createElement('div');
        txt.className = 'question-text';
        txt.textContent = message;
        block.appendChild(txt);

        self.container.appendChild(block);
      },

      askText(question, key) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderTextInput(question, key, val || "");
        self.recauseEngine.stopHere();
      },

      askMultiText(question, key) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderMultiTextInput(question, key, val || "");
        self.recauseEngine.stopHere();
      },

      askRadio(question, key, options) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderRadioInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      askCheckbox(question, key, options) {
        const val = self.recauseEngine.getState(key) || "";
        const editing = !!self.editing[key];
        if (val && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderCheckboxInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      askButton(question, key, options) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key);
          return;
        }
        self.renderButtonInput(question, key, val, options);
        self.recauseEngine.stopHere();
      },

      askButtonForced(question, key, options) {
        const val = self.recauseEngine.getState(key);
        self.renderButtonInput(question, key, val, options);
        self.recauseEngine.stopHere();
      }
    };
  }

  renderReadOnly(question, answerVal, key) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-button';
    editBtn.textContent = "Edit";
    editBtn.onclick = () => {
      Object.keys(this.editing).forEach(k => this.editing[k] = false);
      this.editing[key] = true;
      this.runFlow();
    };
    header.appendChild(editBtn);

    block.appendChild(header);

    const ans = document.createElement('div');
    ans.className = 'answer-line';
    ans.textContent = answerVal;
    block.appendChild(ans);

    this.container.appendChild(block);
  }

  renderTextInput(question, key, existingVal) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = existingVal;
    block.appendChild(inp);

    const finalize = () => {
      const val = inp.value.trim() || undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };

    inp.addEventListener('keydown', ev => {
      if (ev.key==="Enter") {
        ev.preventDefault();
        finalize();
      }
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = finalize;
    block.appendChild(btn);

    this.container.appendChild(block);
    inp.focus();
  }

  renderMultiTextInput(question, key, existingVal) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const ta = document.createElement('textarea');
    ta.rows = 4;
    ta.value = existingVal;
    block.appendChild(ta);

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const val = ta.value.trim() || undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    ta.focus();
  }

  renderRadioInput(question, key, existingVal, options) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    let firstRadio = null;
    options.forEach(opt => {
      const line = document.createElement('div');
      line.className = 'option-line';

      const r = document.createElement('input');
      r.type = 'radio';
      r.name = key;
      r.value = opt.value;
      if (opt.value === existingVal) r.checked = true;
      if (!firstRadio) firstRadio = r;

      const lbl = document.createElement('label');
      lbl.textContent = opt.label || opt.value;

      line.appendChild(r);
      line.appendChild(lbl);
      block.appendChild(line);
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const chosen = block.querySelector(`input[name="${key}"]:checked`);
      const val = chosen ? chosen.value : undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    if (firstRadio) firstRadio.focus();
  }

  renderCheckboxInput(question, key, existingVal, options) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const chosenValues = existingVal
      ? existingVal.split(",").map(x => x.trim()).filter(Boolean)
      : [];
    let firstCheck = null;

    options.forEach(opt => {
      const line = document.createElement('div');
      line.className = 'option-line';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = opt.value;
      if (chosenValues.includes(opt.value)) cb.checked = true;
      if (!firstCheck) firstCheck = cb;

      const lbl = document.createElement('label');
      lbl.textContent = opt.label || opt.value;

      line.appendChild(cb);
      line.appendChild(lbl);
      block.appendChild(line);
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const cbs = block.querySelectorAll('input[type="checkbox"]');
      const arr = [];
      cbs.forEach(c => {
        if (c.checked) arr.push(c.value);
      });
      const val = arr.length>0 ? arr.join(", ") : undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.runFlow();
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    if (firstCheck) firstCheck.focus();
  }

  renderButtonInput(question, key, existingVal, options) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';
    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const btnRow = document.createElement('div');
    btnRow.className = 'button-row';

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.textContent = opt.label || opt.value;
      btn.onclick = () => {
        this.recauseEngine.setState(key, opt.value);
        this.editing[key] = false;
        this.runFlow();
      };
      btnRow.appendChild(btn);
    });

    block.appendChild(btnRow);
    this.container.appendChild(block);

    const firstBtn = btnRow.querySelector('button');
    if (firstBtn) firstBtn.focus();
  }

  serializeState() {
    return this.recauseEngine.serializeState();
  }
}

/*******************************************************************************
 * (3) Business domain specific Vacation Planner Chat flow
 *     - Demonstrates usage of the ChatWizard and Recause Frameworks
 *     - Very concise flow programming keeping full JavaScript programming
 *       flexibility as not reliant on a typical DSL-based programming model.
 *     - Still potential to make things even more concise. But hard to beat.
 *     - Note how the missing passport causes a change in the flow. Try it!
 *     - Another Framework might offer a multi-page forms wizard instead in 
 *       a similarly concise fashion.
 ******************************************************************************/

function vacationPlannerFlow(flow) {
  flow.askText("Hi there! What's your name?", "userName");
  flow.askRadio(
    "Which region are you planning to travel to?",
    "travelRegion",
    [
      { value: "domestic", label: "Domestic (within country)" },
      { value: "international", label: "International" }
    ]
  );
  if (flow.recause.getState("travelRegion") === "international") {
    flow.recause.forceStateOrder("travelRegion", "hasPassport");
    flow.askRadio(
      "Do you have a valid passport?",
      "hasPassport",
      [
        { value: "yes", label: "Yes" },
        { value: "no",  label: "No" }
      ]
    );
    if (flow.recause.getState("hasPassport") === "no") {
      flow.recause.setState("travelRegion", "domestic");
      flow.askButtonForced(
        `It seems you don’t have a passport. Let’s switch to a domestic trip for now!`,
        `okToSwitch`,
        [
          { value: "ok", label: "OK" }
        ]
      );
    }
  }
  flow.askCheckbox(
    "Which activities are you interested in?",
    "travelActivities",
    [
      { value: "Skiing" },
      { value: "Beach" },
      { value: "City Tours" },
      { value: "Hiking" },
      { value: "Shopping" }
    ]
  );
  flow.askMultiText("Any special requirements or details we should know about?", "extraNotes");
  flow.say("Thanks for planning your trip with us! Call showData() to review your answers.");
}

/*******************************************************************************
 * (4) Integration
 ******************************************************************************/
document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById('chat-container');

  // Load any saved state from localStorage if desired
  const savedState = localStorage.getItem("chatFlowState") || null;

  const wizard = new ChatWizard(container, savedState, vacationPlannerFlow);
  wizard.runFlow();

  // For debugging or saving
  window.showData = () => {
    const json = wizard.serializeState();
    console.log("Flow State (current):", JSON.parse(json));
    alert("Open console => see final JSON:\n\n" + json);
  };
  window.saveData = () => {
    localStorage.setItem("chatFlowState", wizard.serializeState());
    alert("State saved to localStorage!");
  };
});
</script>
</body>
</html>
