<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat flow built with ChatWizard Framework built with Recause Metaframework</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: "Helvetica", sans-serif; /* helvetica */
      font-size: 18px;
      color: #eee;
    }
    #chat-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      background: #111;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .question-block {
      margin: 12px 0;
      padding: 8px;
      background: #222;
      border-radius: 4px;
      position: relative;
    }
    .question-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .edit-button {
      margin-left: auto;
      cursor: pointer;
      background: #444;
      border: 1px solid #888;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
    }
    .edit-button:hover {
      background: #666;
    }
    .question-text {
      color: #ff9900; /* orange question text */
      font-weight: bold;
      margin-bottom: 6px;
    }
    .answer-line {
      margin: 4px 0;
      color: #eee;
    }
    input, textarea, select {
      background: #333;
      border: 1px solid #666;
      color: #eee;
      padding: 4px;
      font-family: inherit;
      font-size: 16px;
      border-radius: 4px;
      display: block;
      margin-bottom: 8px;
      width: 100%;
      box-sizing: border-box;
    }
    input:focus, textarea:focus, select:focus {
      outline: 1px solid #888;
    }
    button {
      cursor: pointer;
      background: #444;
      border: 1px solid #888;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
    }
    button:hover {
      background: #666;
    }
    .option-line {
      margin: 4px 0;
    }
    .option-line label {
      margin-left: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat-container"></div>

<script>
/*******************************************************************************
 * 1) Recause Metaframework
 *    - We throw StopFlow to pause a flow.
 *    - The RecauseEngine stores all data in this.state.
 *    - The state can be transported and the flow continued elsewhere.
 ******************************************************************************/
class StopFlow extends Error {
  constructor() {
    super("StopFlow");
    this.name = "StopFlow";
  }
}

class RecauseEngine {
  constructor(savedState) {
    // If savedState is a JSON string, parse it. If object, use it; else empty.
    let initialData = {};
    if (typeof savedState === 'string') {
      try {
        initialData = JSON.parse(savedState);
      } catch (e) {
        console.warn("Failed to parse saved state JSON:", e);
      }
    } else if (typeof savedState === 'object' && savedState !== null) {
      initialData = savedState;
    }
    this.state = { ...initialData };
  }

  runFlow(flowFn, frameworkAPI) {
    try {
      const recauseApi = {
        ...frameworkAPI,
        recause: this
      };
      flowFn(recauseApi);
    } catch(e) {
      if (!(e instanceof StopFlow)) {
        throw e;
      }
      // If it's StopFlow, we stop quietly
    }
  }

  stopHere() {
    throw new StopFlow();
  }

  // Basic state methods
  hasState(key) {
    return Object.prototype.hasOwnProperty.call(this.state, key);
  }
  getState(key) {
    return this.state[key];
  }
  setState(key, value) {
    this.state[key] = value;
  }
  removeState(key) {
    delete this.state[key];
  }

  // Optional “guard” or “defaults”
  getStateElseStop(key) {
    if (!this.hasState(key)) {
      this.stopHere();
    }
    return this.getState(key);
  }
  getStateOrDefault(key, defaultVal) {
    return this.hasState(key) ? this.getState(key) : defaultVal;
  }

  // Serialization
  serializeState() {
    return JSON.stringify(this.state);
  }
}

/*******************************************************************************
 * 2) ChatWizard Framework - A framework built on the Recause Metaframework
 *    - Creates and owns a RecauseEngine internally.
 *    - Provides askText, askMulti, askRadio, askCheckbox, etc. - extensible 
 ******************************************************************************/
class ChatWizard {
  constructor(container, savedState = null) {
    this.container = container;
    // We create our RecauseEngine here:
    this.recauseEngine = new RecauseEngine(savedState);
    // Ephemeral UI state (editing flags)
    this.editing = {};
  }

  reRunFlow(domainFlow) {
    this.container.innerHTML = "";
    const api = this.buildFrameworkAPI(domainFlow);
    this.recauseEngine.runFlow(domainFlow, api);
  }

  buildFrameworkAPI(domainFlow) {
    const self = this;

    return {
      say(message) {
        const block = document.createElement('div');
        block.className = 'question-block';

        const txt = document.createElement('div');
        txt.className = 'question-text';
        txt.textContent = message;
        block.appendChild(txt);

        self.container.appendChild(block);
      },

      askText(question, key) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key, domainFlow);
        } else {
          self.renderTextInput(question, key, val || "", domainFlow);
          self.recauseEngine.stopHere();
        }
      },

      askMulti(question, key) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key, domainFlow);
        } else {
          self.renderMultiInput(question, key, val || "", domainFlow);
          self.recauseEngine.stopHere();
        }
      },

      askRadio(question, key, options) {
        const val = self.recauseEngine.getState(key);
        const editing = !!self.editing[key];
        if (val !== undefined && !editing) {
          self.renderReadOnly(question, val, key, domainFlow);
        } else {
          self.renderRadioInput(question, key, val, options, domainFlow);
          self.recauseEngine.stopHere();
        }
      },

      askCheckbox(question, key, options) {
        const val = self.recauseEngine.getState(key) || "";
        const editing = !!self.editing[key];
        if (val !== "" && val !== undefined && !editing) {
          self.renderReadOnly(question, val, key, domainFlow);
        } else {
          self.renderCheckboxInput(question, key, val, options, domainFlow);
          self.recauseEngine.stopHere();
        }
      }
    };
  }

  /*
   * Render methods
   */
  renderReadOnly(question, answerVal, key, domainFlow) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';

    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);

    const editBtn = document.createElement('button');    // Edit button handling
    editBtn.className = 'edit-button';
    editBtn.textContent = "Edit";
    editBtn.onclick = () => {
      Object.keys(this.editing).forEach(k => this.editing[k] = false);
      this.editing[key] = true;
      this.reRunFlow(domainFlow);
    };
    header.appendChild(editBtn);

    block.appendChild(header);

    const ans = document.createElement('div');
    ans.className = 'answer-line';
    ans.textContent = answerVal;
    block.appendChild(ans);

    this.container.appendChild(block);
  }

  renderTextInput(question, key, existingVal, domainFlow) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';

    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);

    block.appendChild(header);

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = existingVal;
    block.appendChild(inp);

    const finalize = () => {
      const val = inp.value.trim() || undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.reRunFlow(domainFlow);
    };

    inp.addEventListener('keydown', ev => {
      if (ev.key === "Enter") {
        ev.preventDefault();
        finalize();
      }
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = finalize;
    block.appendChild(btn);

    this.container.appendChild(block);
    inp.focus();
  }

  renderMultiInput(question, key, existingVal, domainFlow) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';

    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);
    block.appendChild(header);

    const ta = document.createElement('textarea');
    ta.rows = 4;
    ta.value = existingVal;
    block.appendChild(ta);

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const val = ta.value.trim() || undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.reRunFlow(domainFlow);
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    ta.focus();
  }

  renderRadioInput(question, key, existingVal, options, domainFlow) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';

    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);

    block.appendChild(header);

    let firstRadio = null;
    options.forEach(opt => {
      const line = document.createElement('div');
      line.className = 'option-line';

      const r = document.createElement('input');
      r.type = 'radio';
      r.name = key;
      r.value = opt.value;
      if (opt.value === existingVal) {
        r.checked = true;
      }
      if (!firstRadio) {
        firstRadio = r;
      }

      const lbl = document.createElement('label');
      lbl.textContent = opt.label || opt.value;

      line.appendChild(r);
      line.appendChild(lbl);
      block.appendChild(line);
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const chosen = block.querySelector(`input[name="${key}"]:checked`);
      const val = chosen ? chosen.value : undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.reRunFlow(domainFlow);
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    if (firstRadio) {
      firstRadio.focus();
    }
  }

  renderCheckboxInput(question, key, existingVal, options, domainFlow) {
    const block = document.createElement('div');
    block.className = 'question-block';

    const header = document.createElement('div');
    header.className = 'question-header';

    const q = document.createElement('div');
    q.className = 'question-text';
    q.textContent = question;
    header.appendChild(q);

    block.appendChild(header);

    // existingVal might be "Heater, AC", so split it by commas
    const chosenValues = existingVal
      ? existingVal.split(",").map(x => x.trim()).filter(Boolean)
      : [];
    let firstCheck = null;

    options.forEach(opt => {
      const line = document.createElement('div');
      line.className = 'option-line';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = opt.value;
      if (chosenValues.includes(opt.value)) {
        cb.checked = true;
      }
      if (!firstCheck) {
        firstCheck = cb;
      }

      const lbl = document.createElement('label');
      lbl.textContent = opt.label || opt.value;

      line.appendChild(cb);
      line.appendChild(lbl);
      block.appendChild(line);
    });

    const btn = document.createElement('button');
    btn.textContent = "OK";
    btn.onclick = () => {
      const cbs = block.querySelectorAll(`input[type="checkbox"]`);
      const arr = [];
      cbs.forEach(c => {
        if (c.checked) {
          arr.push(c.value);
        }
      });
      const val = (arr.length > 0) ? arr.join(", ") : undefined;
      this.recauseEngine.setState(key, val);
      this.editing[key] = false;
      this.reRunFlow(domainFlow);
    };
    block.appendChild(btn);

    this.container.appendChild(block);
    if (firstCheck) {
      firstCheck.focus();
    }
  }

  // Helper to expose final data for debugging or saving
  serializeState() {
    return this.recauseEngine.serializeState();
  }
}

/*******************************************************************************
 * 3) Domain Flow - An application domain specific flow example.
 *    - A short example that uses all controls in a linear style.
 *    - Almost anything goes here.
 *    - Just remember to keep flow state in flow.recause
 ******************************************************************************/

function domainFlow(flow) {
  flow.say("Hello! We'll ask about your houses now...two questions each.");
  flow.askText("How many houses do you have?", "houseCount");
  const count = parseInt(flow.recause.getState("houseCount") || "0", 10);
  if (count > 0) {
    for (let i = 0; i < count; i++) {
      flow.askText(`Street of house #${i + 1}?`, `houseStreet.${i}`);
      flow.askRadio(
        `Which region is house #${i + 1} located in?`,
        `houseRegion.${i}`,
        [
          { value: "north", label: "North" },
          { value: "south", label: "South" },
          { value: "east",  label: "East"  },
          { value: "west",  label: "West"  }
        ]
      );
      flow.askText(`ZIP code of house #${i + 1}?`, `houseZip.${i}`);
      flow.askCheckbox(
        `Which amenities does house #${i + 1} have?`,
        `houseAmenities.${i}`,
        [
          { value: "Heater", label: "Heater" },
          { value: "AC",     label: "Air Conditioning" },
          { value: "Pool",   label: "Pool" }
        ]
      );
    }
  } else {
    flow.say("No houses => skipping addresses!");
  }
  flow.askMulti("Any final remarks or comments?", "finalRemarks");
  flow.say("All done. Type showData() to see final data in the console!");
}

/*******************************************************************************
 * 4) Integration
 *    - Instantiates the ChatWizard, passing in any saved state from localStorage.
 *    - Runs the domain flow on page load. Re-runs happen upon prompts.
 ******************************************************************************/
document.addEventListener("DOMContentLoaded", () => {
  const container  = document.getElementById('chat-container');
  const savedState = localStorage.getItem("chatFlowState") || null;
  const wizard     = new ChatWizard(container, savedState);

  wizard.reRunFlow(domainFlow); // Kick off the domainFlow

  // For debugging or saving
  window.showData = () => {
    const json = wizard.serializeState();
    console.log("Flow State:", JSON.parse(json));
    alert("Open console => see final JSON:\n\n" + json);
  };

  window.saveData = () => {
    localStorage.setItem("chatFlowState", wizard.serializeState());
    alert("State saved to localStorage!");
  };
});
</script>
</body>
</html>
